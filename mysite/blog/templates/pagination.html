<div class="pagination">                                  <!-- 9.14 PAGINATION UI -->
    <span class="step-links">
        {% if page.has_previous %}                                <!-- 9.15 Prev check -->
            <a href="?page={{page.previous_page_number}}"><</a>       <!-- 9.16 Prev link -->
        {% endif %}
    </span>

    <span class="current">
        Page {{page.number}} of {{page.paginator.num_pages}}      <!-- 9.17 Page info -->
    </span>

    <span class="step-links">
        {% if page.has_next %}                                    <!-- 9.18 Next check -->
            <a href="?page={{page.next_page_number}}">></a>          <!-- 9.19 Next link -->
        {% endif %}
</span>
</div>

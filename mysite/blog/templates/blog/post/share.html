{% extends "blog/base.html" %}

{% block title %}
    Share a post
{% endblock %}

{% block content %}
    {% if sent %}
        <!-- 11.16 EMAIL success -->
        <h1>
            Email successfully sent to {{ form.cleaned_data.to }}
        </h1>
    {% else %}
        <h1>
            Share "{{ post.title }}" by email
        </h1>
        <form method="post">
            <!-- 11.17 EMAIL form -->
            {{ form.as_p }}
            {% csrf_token %}
            <input type="submit" value="Send Email">
        </form>
    {% endif %}
{% endblock %}
